<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Biblioteca</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 440px;
      overflow: hidden;
    }

    .header {
      background: #1a3a5c;
      color: #fff;
      padding: 32px;
      text-align: center;
    }

    .header h1 { font-size: 22px; font-weight: 600; letter-spacing: 0.5px; }
    .header p  { font-size: 13px; color: #a8c4e0; margin-top: 6px; }

    .tabs {
      display: flex;
      border-bottom: 1px solid #e5e9ef;
    }

    .tab {
      flex: 1;
      padding: 14px;
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
      color: #6b7a8d;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: #1a3a5c;
      border-bottom-color: #1a3a5c;
    }

    .form-body { padding: 28px 32px 32px; }

    .form-panel { display: none; }
    .form-panel.active { display: block; }

    .field { margin-bottom: 18px; }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #4a5568;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    input, select {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #d1d9e0;
      border-radius: 8px;
      font-size: 14px;
      color: #2d3748;
      outline: none;
      transition: border-color 0.2s;
      background: #fff;
    }

    input:focus, select:focus { border-color: #1a3a5c; }

    .btn {
      width: 100%;
      padding: 12px;
      background: #1a3a5c;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 4px;
    }

    .btn:hover { background: #14304d; }

    .msg {
      margin-top: 14px;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }

    .msg.erro    { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6c6; display: block; }
    .msg.sucesso { background: #f0fff4; color: #276749; border: 1px solid #b2dfcc; display: block; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>📚 Sistema de Biblioteca</h1>
    <p>Gerenciamento de empréstimos</p>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="trocarAba('login')">Entrar</button>
    <button class="tab" onclick="trocarAba('cadastro')">Cadastrar</button>
  </div>

  <div class="form-body">

    <div class="form-panel active" id="painel-login">
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="login-email" placeholder="seu@email.com" data-placeholder="seu@email.com">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="login-senha" placeholder="senha" data-placeholder="senha">
      </div>
      <button class="btn" onclick="login()">Entrar</button>
      <div class="msg" id="msg-login"></div>
    </div>

    <div class="form-panel" id="painel-cadastro">
      <div class="field">
        <label>Nome completo</label>
        <input type="text" id="cad-nome" placeholder="Nome Completo" data-placeholder="Nome Completo">
      </div>
      <div class="field">
        <label>E-mail</label>
        <input type="email" id="cad-email" placeholder="seu@email.com" data-placeholder="seu@email.com">
      </div>
      <div class="field">
        <label>Senha</label>
        <input type="password" id="cad-senha" placeholder="Crie uma senha" data-placeholder="Crie uma senha">
      </div>
      <div class="field">
        <label>Perfil</label>
        <select id="cad-perfil">
          <option value="leitor">Leitor</option>
          <option value="bibliotecario">Bibliotecário</option>
        </select>
      </div>
      <button class="btn" onclick="cadastrar()">Criar conta</button>
      <div class="msg" id="msg-cadastro"></div>
    </div>

  </div>
</div>

<script src="/javascript/index.js"></script>
</body>
</html>
